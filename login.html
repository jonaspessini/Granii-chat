<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Section -->

</button>
<h1 class="text-lg font-bold text-slate-900 dark:text-white font-manrope antialiased tracking-tight">Entrar</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<!-- Substitua TODO o conteúdo do <main> por isso: -->
<main class="flex-grow flex items-center justify-center px-container-margin py-stack-xl">
<div class="w-full max-w-[400px] flex flex-col items-center">
    <div class="mb-stack-xl text-center">
        <div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary/10 mb-stack-md mx-auto">
            <span class="material-symbols-outlined text-on-primary-container text-4xl">lock</span>
        </div>
        <h2 class="font-h1 text-h1 text-on-surface mb-stack-sm" id="formTitle">Bem-vindo de volta</h2>
        <p class="font-body-md text-body-md text-on-surface-variant" id="formSubtitle">Acesse sua conta para continuar</p>
    </div>

    <div class="w-full bg-surface-container-lowest p-8 rounded-xl shadow-md border border-slate-100">
        <!-- Formulário de Login -->
        <form id="loginForm" class="flex flex-col gap-stack-lg">
            <div class="flex flex-col gap-2" id="displayNameGroup" style="display: none;">
                <label class="font-label-md text-label-md text-on-surface-variant ml-1">Como voce quer ser chamado?</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">badge</span>
                    <input class="w-full h-12 pl-12 pr-4 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container/20 focus:border-primary outline-none" id="displayName" placeholder="Seu nome" type="text" maxlength="40" autocomplete="name">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="font-label-md text-label-md text-on-surface-variant ml-1">E-mail</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
                    <input class="w-full h-12 pl-12 pr-4 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container/20 focus:border-primary outline-none" id="email" placeholder="seu@email.com" type="email">
                </div>
            </div>
            
            <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center ml-1">
                    <label class="font-label-md text-label-md text-on-surface-variant">Senha</label>
                    <a class="text-label-sm font-label-sm text-primary hover:underline cursor-pointer" id="toggleForm">Criar conta</a>
                </div>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">key</span>
                    <input class="w-full h-12 pl-12 pr-12 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container/20 focus:border-primary outline-none" id="password" placeholder="••••••••" type="password">
                    <button type="button" class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-outline flex items-center justify-center w-9 h-9 rounded-lg hover:bg-slate-50" data-target="password" aria-label="Mostrar senha">
                        <span class="material-symbols-outlined text-[22px]">visibility</span>
                    </button>
                </div>
            </div>

            <div id="confirmPasswordGroup" style="display: none;">
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">verified</span>
                    <input class="w-full h-12 pl-12 pr-12 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container/20 focus:border-primary outline-none" id="confirmPassword" placeholder="Confirmar senha" type="password">
                    <button type="button" class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-outline flex items-center justify-center w-9 h-9 rounded-lg hover:bg-slate-50" data-target="confirmPassword" aria-label="Mostrar senha">

                Entrar
                <span class="material-symbols-outlined text-[20px]">login</span>

<script type="module">
    import { supabase, signIn, signUp } from './js/supabase-config.js';
    import { activateSingleSession } from './js/single-session.js';
    
    let isLoginMode = true;
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const toggleForm = document.getElementById('toggleForm');
    const submitBtn = document.getElementById('submitBtn');
    const displayNameGroup = document.getElementById('displayNameGroup');
    const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
    const messageDiv = document.getElementById('message');
    const emailInput = document.getElementById('email');
    const displayNameInput = document.getElementById('displayName');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');

    document.querySelectorAll('.password-toggle').forEach((button) => {
        button.addEventListener('click', () => {
            const input = document.getElementById(button.dataset.target);
            const icon = button.querySelector('.material-symbols-outlined');
            const shouldShow = input.type === 'password';

            input.type = shouldShow ? 'text' : 'password';
            icon.textContent = shouldShow ? 'visibility_off' : 'visibility';
            button.setAttribute('aria-label', shouldShow ? 'Ocultar senha' : 'Mostrar senha');
        });
    });
    
    // Verificar se já está logado
    async function checkSession() {
        const user = await supabase.auth.getUser();
        if (user.data.user) {
            window.location.href = 'index2.html';
        }
    }
    checkSession();
    
    // Alternar entre login e cadastro
    toggleForm.addEventListener('click', (e) => {
        e.preventDefault();
        isLoginMode = !isLoginMode;
        
        if (isLoginMode) {
            formTitle.textContent = 'Bem-vindo de volta';
            formSubtitle.textContent = 'Acesse sua conta para continuar';
            toggleForm.textContent = 'Criar conta';
            submitBtn.innerHTML = 'Entrar <span class="material-symbols-outlined text-[20px]">login</span>';
            displayNameGroup.style.display = 'none';
            confirmPasswordGroup.style.display = 'none';
            messageDiv.textContent = '';
        } else {
            formTitle.textContent = 'Criar conta';
            formSubtitle.textContent = 'Cadastre-se para começar';
            toggleForm.textContent = 'Já tenho conta';
            submitBtn.innerHTML = 'Cadastrar <span class="material-symbols-outlined text-[20px]">person_add</span>';
            displayNameGroup.style.display = 'flex';
            confirmPasswordGroup.style.display = 'block';
            messageDiv.textContent = '';
        }
    });
    
    // Submit do formulário
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const displayName = displayNameInput.value.trim();
        const password = passwordInput.value;
        
        messageDiv.textContent = '';
        messageDiv.className = 'text-center text-sm mt-2';
        
        if (!email || !password) {
            messageDiv.textContent = 'Preencha todos os campos!';
            messageDiv.classList.add('text-red-500');
            return;
        }
        
        if (!isLoginMode) {
            const confirmPassword = confirmPasswordInput.value;
            if (!displayName) {
                messageDiv.textContent = 'Informe como voce quer ser chamado!';
                messageDiv.classList.add('text-red-500');
                return;
            }
            if (password !== confirmPassword) {
                messageDiv.textContent = 'As senhas não coincidem!';
                messageDiv.classList.add('text-red-500');
                return;
            }
            if (password.length < 6) {
                messageDiv.textContent = 'A senha deve ter pelo menos 6 caracteres!';
                messageDiv.classList.add('text-red-500');
                return;
            }
        }
        
        // Desabilitar botão durante a requisição
        submitBtn.disabled = true;
        submitBtn.textContent = isLoginMode ? 'Entrando...' : 'Cadastrando...';
        
        try {
            if (isLoginMode) {
                await signIn(email, password);
                await activateSingleSession();
                messageDiv.textContent = 'Login realizado! Redirecionando...';
                messageDiv.classList.add('text-green-500');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                await signUp(email, password, displayName);
                messageDiv.textContent = 'Cadastro realizado! Verifique seu email para confirmar.';
                messageDiv.classList.add('text-green-500');
                // Limpar campos
                emailInput.value = '';
                displayNameInput.value = '';
                passwordInput.value = '';
                confirmPasswordInput.value = '';
                // Voltar para login após 2 segundos
                setTimeout(() => {
                    toggleForm.click();
                }, 2000);
            }
        } catch (error) {
            messageDiv.textContent = `Erro: ${error.message}`;
            messageDiv.classList.add('text-red-500');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = isLoginMode ? 'Entrar <span class="material-symbols-outlined text-[20px]">login</span>' : 'Cadastrar <span class="material-symbols-outlined text-[20px]">person_add</span>';
        }
    });
</script>

<script type="module">
    // Teste de conexão com Supabase
    import { supabase } from './js/supabase-config.js';
    
    console.log('Supabase URL:', supabase.supabaseUrl);
    console.log('Testando conexão...');
    
    // Testar se a conexão está funcionando
    async function testConnection() {
        try {
            const { data, error } = await supabase.auth.getSession();
            if (error) {
                console.error('Erro de conexão:', error);
                alert('Erro de conexão com Supabase! Verifique suas credenciais.');
            } else {
                console.log('Conexão OK!');
            }
        } catch (e) {
            console.error('Erro:', e);
            alert('Erro ao conectar com Supabase: ' + e.message);
        }
    }
    
    testConnection();
</script>
