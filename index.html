<!-- PRIMEIRO SCRIPT: Carrega Supabase como Módulo -->
<script type="module">
    import { initSupabaseForUser } from './js/supabase-integration.js';
    import { supabase, getCurrentUser, signOut } from './js/supabase-config.js';
    import { syncAllToSupabase } from './js/supabase-sync.js';
    import { startSingleSessionGuard } from './js/single-session.js';
    window.initSupabase = initSupabaseForUser;

    function limparDadosLocaisAoSair() {
        const keysToRemove = [];

        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);

            if (key && (
                key.startsWith('lancamentos_') ||
                key.includes('_lancamentos_') ||
                key.startsWith('cartoes_') ||
                key.endsWith('_cartoes_credito') ||
                key.startsWith('contas_') ||
                key.includes('_contas_') ||
                key === 'cartoes_credito' ||
                key === 'contas_bancarias' ||
                key === 'contas_config' ||
                key === 'nextContaId' ||
                key === '_last_user_id' ||
                key.startsWith('sb-')
            )) {
                keysToRemove.push(key);
            }
        }

        keysToRemove.forEach(key => localStorage.removeItem(key));
    }

    async function atualizarUsuarioHome() {
        const userEmail = document.getElementById('homeUserEmail');
        const user = await getCurrentUser();

        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        if (userEmail) {
            const displayName = user.user_metadata?.display_name || user.user_metadata?.name || user.email || 'Usuario conectado';
            userEmail.textContent = displayName;
            userEmail.title = user.email || displayName;
        }
    }

    async function abrirEditorNomeUsuario() {
        const user = await getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const nomeAtual = user.user_metadata?.display_name || user.user_metadata?.name || '';
        const modal = document.getElementById('homeNameModal');
        const input = document.getElementById('homeNameInput');

        input.value = nomeAtual;
        modal.classList.add('active');
        setTimeout(() => input.focus(), 0);
    }

    function fecharEditorNomeUsuario() {
        document.getElementById('homeNameModal')?.classList.remove('active');
    }

    async function salvarNomeUsuario() {
        const input = document.getElementById('homeNameInput');
        const saveBtn = document.getElementById('homeNameSaveBtn');
        const novoNome = input.value.trim();

        if (!novoNome) {
            alert('Informe um nome para aparecer no app.');
            input.focus();
            return;
        }

        const user = await getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        saveBtn.disabled = true;

        const { data, error } = await supabase.auth.updateUser({
            data: {
                ...(user.user_metadata || {}),
                display_name: novoNome,
                name: novoNome
            }
        });

        saveBtn.disabled = false;

        if (error) {
            alert('Nao foi possivel alterar o nome: ' + error.message);
            return;
        }
        // atualizado
        const userEmail = document.getElementById('homeUserEmail');
        if (userEmail) {
            userEmail.textContent = novoNome;
            userEmail.title = data.user?.email || user.email || novoNome;
        }
        fecharEditorNomeUsuario();
    }

    async function sairDaHome() {
        const logoutBtn = document.getElementById('homeLogoutBtn');

        if (!confirm('Deseja realmente sair da sua conta? Seus dados serao salvos.')) {
            return;
        }

        if (logoutBtn) logoutBtn.disabled = true;

        try {
            await syncAllToSupabase();
        } catch (syncError) {
            console.warn('Erro ao sincronizar antes de sair:', syncError);
        }

        try {
            await signOut();
        } catch (logoutError) {
            console.warn('Erro ao sair:', logoutError);
        }

        limparDadosLocaisAoSair();
        sessionStorage.setItem('_from_logout', '1');
        window.location.href = 'login.html';
    }

    document.getElementById('homeLogoutBtn')?.addEventListener('click', sairDaHome);
    document.getElementById('homeUserNameBtn')?.addEventListener('click', abrirEditorNomeUsuario);
    document.getElementById('homeNameCancelBtn')?.addEventListener('click', fecharEditorNomeUsuario);
    document.getElementById('homeNameSaveBtn')?.addEventListener('click', salvarNomeUsuario);
    document.getElementById('homeNameModal')?.addEventListener('click', (event) => {
        if (event.target.id === 'homeNameModal') fecharEditorNomeUsuario();
    });
    document.getElementById('homeNameInput')?.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') salvarNomeUsuario();
        if (event.key === 'Escape') fecharEditorNomeUsuario();
    });
    atualizarUsuarioHome();
    startSingleSessionGuard();
    console.log('✅ Supabase module loaded');
</script>

<!-- SEGUNDO SCRIPT: Seu código original modificado -->
<script>
    (async function() {
        // ========== INICIALIZAR SUPABASE PRIMEIRO ==========
        if (window.initSupabase) {
            console.log('🔄 Inicializando Supabase...');
            await window.initSupabase();
            console.log('✅ Supabase inicializado!');
        }
        
        // ========== CONFIGURAÇÕES INICIAIS ==========
        let currentDate = new Date();
        const today = new Date();
        let pickerCurrentYear = today.getFullYear();
        let pickerSelectedMonth = today.getMonth();
        let valoresVisiveis = true;
        
        const monthNames = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
        const monthNamesShort = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

        // Elementos DOM
        const currentMonthTextHeader = document.getElementById('currentMonthTextHeader');
        const currentBalanceDisplay = document.getElementById('currentBalanceDisplay');
        const headerReceitasTotaisEl = document.getElementById('headerReceitasTotais');
        const headerDespesasTotaisEl = document.getElementById('headerDespesasTotais');
        const cartoesContainer = document.getElementById('cartoesContainer');

        // ========== FUNÇÕES AUXILIARES ==========
        function formatToBRL(value) {
            if (isNaN(value)) return '0,00';
            return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getMonthKey(date = currentDate) {
            return date.toISOString().slice(0, 7);
        }

        function getHojeZerado() {
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);
            return hoje;
        }

        function calcularDiasAteVencimento(dataVencimento) {
            if (!dataVencimento) return null;
            const hoje = getHojeZerado();
            const vencimento = new Date(dataVencimento + 'T00:00:00');
            vencimento.setHours(0, 0, 0, 0);
            const diffTime = vencimento - hoje;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        // ========== SALDO ACUMULADO GLOBAL ==========
        function getSaldoAcumulado() {
            let totalReceitasPagas = 0;
            let totalDespesasPagas = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('lancamentos_')) {
                    const data = localStorage.getItem(key);
                    const lancamentos = data ? JSON.parse(data) : [];
                    lancamentos.forEach(lanc => {
                        const pago = lanc.hasOwnProperty('pago') ? lanc.pago : false;
                        if (pago) {
                            if (lanc.valor > 0) totalReceitasPagas += lanc.valor;
                            else totalDespesasPagas += lanc.valor;
                        }
                    });
                }
            }
            return totalReceitasPagas + totalDespesasPagas;
        }

        // ========== CARREGAR LANÇAMENTOS DO MÊS ATUAL ==========
        function loadCurrentMonthTransactions() {
            const key = 'lancamentos_' + getMonthKey(currentDate);
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        }

        // ========== ATUALIZAR DISPLAY DO MÊS ==========
        function updateMonthDisplay() {
            const month = currentDate.getMonth();
            const year = currentDate.getFullYear();
            currentMonthTextHeader.textContent = `${monthNames[month]} ${year}`;
            calcularTotais();
            renderizarCartoes();
            renderizarResumoMes();
            renderizarPendencias();
            renderizarHistorico();
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            updateMonthDisplay();
        }

        // ========== CALCULAR TOTAIS ==========
        function calcularTotais() {
            const lancamentos = loadCurrentMonthTransactions();

            let totalReceitas = 0, totalDespesas = 0;
            lancamentos.forEach(lanc => {
                if (lanc.valor > 0) totalReceitas += lanc.valor;
                else totalDespesas += lanc.valor;
            });

            const saldoAcumulado = getSaldoAcumulado();

            if (valoresVisiveis) {
                currentBalanceDisplay.textContent = `R$ ${formatToBRL(saldoAcumulado)}`;
                headerReceitasTotaisEl.textContent = formatToBRL(totalReceitas);
                headerDespesasTotaisEl.textContent = formatToBRL(Math.abs(totalDespesas));
            } else {
                currentBalanceDisplay.textContent = '---';
                headerReceitasTotaisEl.textContent = '---';
                headerDespesasTotaisEl.textContent = '---';
            }
        }

        // ========== RENDERIZAR RESUMO DO MÊS ==========
        function renderizarResumoMes() {
            const lancamentos = loadCurrentMonthTransactions();
            let totalReceitas = 0, totalDespesas = 0;
            lancamentos.forEach(lanc => {
                if (lanc.valor > 0) totalReceitas += lanc.valor;
                else totalDespesas += lanc.valor;
            });
            
            const balanco = totalReceitas + totalDespesas;
            const balancoAbs = Math.abs(balanco);
            const totalDespesasAbs = Math.abs(totalDespesas);
            
            const monthBalanceEl = document.getElementById('monthBalanceDisplay');
            const receitasMesLabel = document.getElementById('receitasMesLabel');
            const despesasMesLabel = document.getElementById('despesasMesLabel');
            const progressBar = document.getElementById('progressBar');
            
            if (valoresVisiveis) {
                if (monthBalanceEl) {
                    monthBalanceEl.textContent = `${balanco >= 0 ? '+' : '-'} R$ ${formatToBRL(balancoAbs)}`;
                    monthBalanceEl.className = `balance-month ${balanco > 0 ? 'positive' : balanco < 0 ? 'negative' : 'neutral'}`;
                }
                if (receitasMesLabel) receitasMesLabel.textContent = `R$ ${formatToBRL(totalReceitas)}`;
                if (despesasMesLabel) despesasMesLabel.textContent = `R$ ${formatToBRL(totalDespesasAbs)}`;
            } else {
                if (monthBalanceEl) monthBalanceEl.textContent = '---';
                if (receitasMesLabel) receitasMesLabel.textContent = '---';
                if (despesasMesLabel) despesasMesLabel.textContent = '---';
            }
            
            let percent = 0;
            let barClass = 'good';
            if (totalReceitas > 0) {
                percent = (totalDespesasAbs / totalReceitas) * 100;
                percent = Math.min(percent, 100);
                if (percent > 90) barClass = 'danger';
                else if (percent > 70) barClass = 'warning';
                else barClass = 'good';
            } else if (totalDespesasAbs > 0) {
                percent = 100;
                barClass = 'danger';
            }
            
            if (progressBar) {
                progressBar.style.width = `${percent}%`;
                progressBar.className = `progress-bar ${barClass}`;
            }
        }

        // ========== RENDERIZAR PENDÊNCIAS ==========
        function renderizarPendencias() {
            const lancamentos = loadCurrentMonthTransactions();
            const hoje = getHojeZerado();
            const limiteFuturo = new Date(hoje);
            limiteFuturo.setDate(hoje.getDate() + 7);
            
            const pendencias = lancamentos.filter(lanc => {
                if (lanc.pago) return false;
                if (!lanc.dataVencimento) return false;
                const dataVenc = new Date(lanc.dataVencimento + 'T00:00:00');
                dataVenc.setHours(0, 0, 0, 0);
                return dataVenc <= limiteFuturo;
            });
            
            pendencias.sort((a, b) => new Date(a.dataVencimento) - new Date(b.dataVencimento));
            
            const container = document.getElementById('pendingList');
            if (!container) return;
            
            if (pendencias.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="ri-checkbox-circle-line"></i><div>Nenhuma pendência próxima</div></div>`;
                return;
            }
            
            container.innerHTML = '';
            pendencias.forEach(pend => {
                const dias = calcularDiasAteVencimento(pend.dataVencimento);
                let statusClass = 'upcoming';
                let statusText = '';
                
                if (dias < 0) {
                    statusClass = 'overdue';
                    statusText = `Vencido há ${Math.abs(dias)} dias`;
                } else if (dias === 0) {
                    statusClass = 'today';
                    statusText = 'Vence hoje';
                } else if (dias <= 3) {
                    statusClass = 'upcoming';
                    statusText = `Vence em ${dias} dia${dias !== 1 ? 's' : ''}`;
                } else {
                    statusClass = 'normal';
                    statusText = `Vence em ${dias} dias`;
                }
                
                const item = document.createElement('div');
                item.className = `pending-item ${statusClass}`;
                item.onclick = () => navigateTo('transacoes');
                item.innerHTML = `
                    <div class="pending-info">
                        <div class="pending-desc">${pend.descricao}</div>
                        <div class="pending-date">${statusText}</div>
                    </div>
                    <div class="pending-value">R$ ${formatToBRL(Math.abs(pend.valor))}</div>
                `;
                container.appendChild(item);
            });
        }

        // ========== RENDERIZAR GRÁFICO DE HISTÓRICO ==========
        function renderizarHistorico() {
            const meses = [];
            
            for (let i = 5; i >= 0; i--) {
                const dataMes = new Date(currentDate);
                dataMes.setMonth(currentDate.getMonth() - i);
                const key = 'lancamentos_' + getMonthKey(dataMes);
                const lancamentos = localStorage.getItem(key) ? JSON.parse(localStorage.getItem(key)) : [];
                
                let receitas = 0, despesas = 0;
                lancamentos.forEach(lanc => {
                    if (lanc.valor > 0) receitas += lanc.valor;
                    else despesas += lanc.valor;
                });
                
                meses.push({
                    nome: monthNamesShort[dataMes.getMonth()],
                    ano: dataMes.getFullYear(),
                    receitas: receitas,
                    despesas: Math.abs(despesas)
                });
            }
            
            const maxValor = Math.max(...meses.flatMap(m => [m.receitas, m.despesas]), 1);
            const alturaMaxima = 80;
            
            const container = document.getElementById('historyChart');
            if (!container) return;
            
            container.innerHTML = '';
            meses.forEach(mes => {
                const alturaReceitas = (mes.receitas / maxValor) * alturaMaxima;
                const alturaDespesas = (mes.despesas / maxValor) * alturaMaxima;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'chart-bar-wrapper';
                wrapper.innerHTML = `
                    <div class="chart-bar-group">
                        <div class="bar-income" style="height: ${Math.max(alturaReceitas, 4)}px;"></div>
                        <div class="bar-expense" style="height: ${Math.max(alturaDespesas, 4)}px;"></div>
                    </div>
                    <div class="chart-label">
                        <div class="chart-month">${mes.nome}</div>
                    </div>
                `;
                container.appendChild(wrapper);
            });
        }

        // ========== RENDERIZAR CARTÕES ==========
        function renderizarCartoes() {
            const lancamentos = loadCurrentMonthTransactions();
            const cartoesCadastrados = JSON.parse(localStorage.getItem('cartoes_credito') || '[]');
            
            if (!cartoesContainer) return;
            
            if (cartoesCadastrados.length === 0) {
                cartoesContainer.style.display = 'none';
                return;
            }
            
            cartoesContainer.style.display = 'block';
            cartoesContainer.innerHTML = '';
            
            const totaisPorCartao = {};
            cartoesCadastrados.forEach(cartao => { totaisPorCartao[cartao.id] = 0; });
            
            lancamentos.forEach(lanc => {
                if (lanc.tipo === 'despesa' && !lanc.pago && lanc.formaPagamento && lanc.formaPagamento !== 'debito_pix') {
                    if (totaisPorCartao.hasOwnProperty(lanc.formaPagamento)) {
                        totaisPorCartao[lanc.formaPagamento] += Math.abs(lanc.valor);
                    }
                }
            });
            
            let somaTotal = 0;
            cartoesCadastrados.forEach(cartao => {
                const valorAberto = totaisPorCartao[cartao.id] || 0;
                somaTotal += valorAberto;
                
                const card = document.createElement('div');
                card.className = 'cartao-item-card';
                card.onclick = () => openCartaoDetails(cartao.id);
                card.innerHTML = `
                    <div class="cartao-item-info">
                        <div class="cartao-item-icon"><i class="ri-bank-card-line"></i></div>
                        <div class="cartao-item-name">${cartao.nome}</div>
                    </div>
                    <div class="cartao-item-value">R$ ${formatToBRL(valorAberto)}</div>
                `;
                cartoesContainer.appendChild(card);
            });
            
            const totalRow = document.createElement('div');
            totalRow.className = 'cartao-total-geral';
            totalRow.innerHTML = `
                <div class="cartao-total-label">Total Faturas</div>
                <div class="cartao-total-value">R$ ${formatToBRL(somaTotal)}</div>
            `;
            cartoesContainer.appendChild(totalRow);
        }

        // ========== MODAL DE DETALHES DO CARTÃO ==========
        function openCartaoDetails(cartaoId) {
            const lancamentos = loadCurrentMonthTransactions();
            const transacoesCartao = lancamentos.filter(lanc => 
                lanc.tipo === 'despesa' && !lanc.pago && lanc.formaPagamento === cartaoId
            );
            
            if (transacoesCartao.length === 0) return;
            
            const cartoesCadastrados = JSON.parse(localStorage.getItem('cartoes_credito') || '[]');
            const cartao = cartoesCadastrados.find(c => c.id === cartaoId);
            const nomeCartao = cartao ? cartao.nome : 'Cartão';
            const totalCartao = Math.abs(transacoesCartao.reduce((sum, t) => sum + t.valor, 0));
            
            let html = `<div style="margin-bottom:20px;"><strong>${nomeCartao}</strong> - Total: R$ ${formatToBRL(totalCartao)}</div>`;
            transacoesCartao.forEach(trans => {
                html += `<div class="cartao-transaction-item">
                            <span>${trans.descricao}</span>
                            <span style="color:#f44336;">R$ ${formatToBRL(Math.abs(trans.valor))}</span>
                        </div>`;
            });
            
            document.getElementById('cartoesDetailsContent').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
            const modal = document.getElementById('cartoesDetailsModal');
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        }
        
        function closeCartoesDetails() {
            const modal = document.getElementById('cartoesDetailsModal');
            modal.classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // ========== MODAL DE MÊS/ANO ==========
        function openMonthYearPickerModal() {
            pickerCurrentYear = currentDate.getFullYear();
            pickerSelectedMonth = currentDate.getMonth();
            renderMonthPickerGrid();
            document.getElementById('monthYearPickerModal').style.display = 'flex';
        }
        
        function closeMonthYearPickerModal() {
            document.getElementById('monthYearPickerModal').style.display = 'none';
        }
        
        function renderMonthPickerGrid() {
            document.getElementById('pickerYearDisplay').textContent = pickerCurrentYear;
            const grid = document.getElementById('monthsGrid');
            grid.innerHTML = '';
            
            monthNamesShort.forEach((monthName, index) => {
                const item = document.createElement('div');
                item.className = 'month-item';
                item.textContent = monthName;
                if (pickerCurrentYear === currentDate.getFullYear() && index === currentDate.getMonth()) {
                    item.classList.add('selected');
                }
                item.onclick = () => {
                    document.querySelectorAll('.month-item').forEach(m => m.classList.remove('selected'));
                    item.classList.add('selected');
                    pickerSelectedMonth = index;
                    goToSelectedMonth();
                };
                grid.appendChild(item);
            });
        }
        
        function changeYearPicker(direction) {
            pickerCurrentYear += direction;
            renderMonthPickerGrid();
        }
        
        function goToSelectedMonth() {
            currentDate.setFullYear(pickerCurrentYear, pickerSelectedMonth, 1);
            updateMonthDisplay();
            closeMonthYearPickerModal();
        }
        
        function goToCurrentMonth() {
            currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
            updateMonthDisplay();
            closeMonthYearPickerModal();
        }

        // ========== FUNÇÃO DO OLHO ==========
        function toggleValoresVisiveis() {
            valoresVisiveis = !valoresVisiveis;
            calcularTotais();
            renderizarResumoMes();
            
            const olhoIcon = document.querySelector('.olho i');
            olhoIcon.className = valoresVisiveis ? 'ri-eye-line' : 'ri-eye-off-line';
        }

        // ========== NAVEGAÇÃO ==========
        function navigateTo(pagina) {
            if (pagina === 'home') {
                window.location.href = 'index.html';
            } else if (pagina === 'transacoes') {
                window.location.href = 'index2.html';
            }
        }

        // ========== EVENT LISTENERS ==========
        document.querySelector('.olho').addEventListener('click', toggleValoresVisiveis);
        document.getElementById('prevMonthHeader').addEventListener('click', () => changeMonth(-1));
        document.getElementById('nextMonthHeader').addEventListener('click', () => changeMonth(1));
        document.getElementById('monthDisplayHeader').addEventListener('click', openMonthYearPickerModal);
        document.getElementById('modalOverlay').addEventListener('click', closeCartoesDetails);
        
        window.onclick = (e) => {
            const modal = document.getElementById('monthYearPickerModal');
            if (e.target === modal) {
                closeMonthYearPickerModal();
            }
        };

        // ========== INICIALIZAÇÃO ==========
        updateMonthDisplay();
        setInterval(() => {
            calcularTotais();
            renderizarPendencias();
        }, 5000);
        
    })();
</script>
